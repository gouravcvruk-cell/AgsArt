services:
  - type: web
    name: riddhiart-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYMENT_MODE
        value: direct
      - key: ADMIN_EMAIL
        value: admin@riddhiart.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
